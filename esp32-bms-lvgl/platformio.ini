; JK BMS LVGL dashboard — Guition JC3248W535 (ESP32-S3-N16R8, 320x480 QSPI AXS15231B)
; LVGL 9 + Arduino_GFX (display driver) + AXS15231B touch.
; pioarduino platform (arduino-esp32 3.x) since Arduino_GFX 1.5 needs esp32-hal-periman.h.
[env:jc3248w535]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board = jc3248w535
framework = arduino

monitor_speed = 115200
monitor_filters = esp32_exception_decoder
upload_protocol = esptool

build_flags =
    -DLV_CONF_INCLUDE_SIMPLE
    -I include

lib_deps =
    moononournation/GFX Library for Arduino@^1.5.0
    lvgl/lvgl@^9.2.2
