; JK BMS → Guition JC3248W535 (ESP32-S3-WROOM-1U-N16R8, 3.5" 320x480 QSPI AXS15231B)
; Build tool: PlatformIO  ·  Framework: Arduino  ·  Display: Arduino_GFX (AXS15231B QSPI)
;
; Display lib note: LovyanGFX 1.2.21 has no AXS15231B/QSPI panel support, so this
; board uses Arduino_GFX (Arduino_ESP32QSPI + Arduino_AXS15231B), the proven stack.
;
; Boot note: uses project-local board def boards/jc3248w535.json (N16R8, octal
; PSRAM, qio_opi). The generic esp32-s3-devkitc-1 (N8/no-PSRAM) boot-loops here.
; A one-time `esptool erase-flash` was needed to clear the factory bootloader.
[env:jc3248w535]
; Arduino_GFX 1.5.0 needs arduino-esp32 3.x (esp32-hal-periman.h), so use the
; pioarduino platform fork (Arduino 3.3.9 / IDF 5.5.4) instead of the official
; espressif32 7.0.1 (which is still arduino-esp32 2.0.17).
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board = jc3248w535
framework = arduino

monitor_speed = 115200
monitor_filters = esp32_exception_decoder
upload_protocol = esptool

lib_deps =
    moononournation/GFX Library for Arduino@^1.5.0
